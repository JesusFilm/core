name: Main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, feature/*]
  merge_group:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch other branches
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --prune --depth=5 origin $GITHUB_BASE_REF
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: generate prisma imports
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: prisma-generate
          all: true
        env:
          DISABLE_ERD: true
      - name: Install Doppler
        uses: dopplerhq/cli-action@v3
      - name: fetch-secrets and build
        uses: mansagroup/nrwl-nx-action@v3
        env:
          DOPPLER_API_ANALYTICS_TOKEN: ${{ secrets.DOPPLER_API_ANALYTICS_TOKEN }}
          DOPPLER_API_GATEWAY_TOKEN: ${{ secrets.DOPPLER_API_GATEWAY_TOKEN }}
          DOPPLER_API_JOURNEYS_TOKEN: ${{ secrets.DOPPLER_API_JOURNEYS_TOKEN }}
          DOPPLER_API_LANGUAGES_TOKEN: ${{ secrets.DOPPLER_API_LANGUAGES_TOKEN }}
          DOPPLER_API_USERS_TOKEN: ${{ secrets.DOPPLER_API_USERS_TOKEN }}
          DOPPLER_API_MEDIA_TOKEN: ${{ secrets.DOPPLER_API_MEDIA_TOKEN }}
          DOPPLER_ARCLIGHT_TOKEN: ${{ secrets.DOPPLER_ARCLIGHT_TOKEN }}
          DOPPLER_DOCS_TOKEN: ${{ secrets.DOPPLER_DOCS_TOKEN }}
          DOPPLER_JOURNEYS_TOKEN: ${{ secrets.DOPPLER_JOURNEYS_TOKEN }}
          DOPPLER_JOURNEYS_ADMIN_TOKEN: ${{ secrets.DOPPLER_JOURNEYS_ADMIN_TOKEN }}
          DOPPLER_PLAYER_TOKEN: ${{ secrets.DOPPLER_PLAYER_TOKEN }}
          DOPPLER_SHORT_LINKS_TOKEN: ${{ secrets.DOPPLER_SHORT_LINKS_TOKEN }}
          DOPPLER_WATCH_TOKEN: ${{ secrets.DOPPLER_WATCH_TOKEN }}
          DOPPLER_WATCH_MODERN_TOKEN: ${{ secrets.DOPPLER_WATCH_MODERN_TOKEN }}
          DOPPLER_WATCH_ADMIN_TOKEN: ${{ secrets.DOPPLER_WATCH_ADMIN_TOKEN }}
          DOPPLER_RESOURCES_TOKEN: ${{ secrets.DOPPLER_RESOURCES_TOKEN }}
          DOPPLER_VIDEOS_ADMIN_TOKEN: ${{ secrets.DOPPLER_VIDEOS_ADMIN_TOKEN }}
          DOPPLER_VIDEO_IMPORTER_TOKEN: ${{ secrets.DOPPLER_VIDEO_IMPORTER_TOKEN }}
          DOPPLER_GITHUB_SERVICE_TOKEN: ${{ secrets.DOPPLER_GITHUB_SERVICE_TOKEN }}
          DOPPLER_CONFIG: stg
        with:
          targets: fetch-secrets,build
  graphql-schema-check:
    # ENG-3689: regenerating every schema.graphql from code must produce no
    # diff — the committed schema files are generated artifacts, and drift
    # between them and the code that generates them otherwise fails silently
    # (subgraph-check only validates composition against the registry).
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: generate prisma imports
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: prisma-generate
          all: true
        env:
          DISABLE_ERD: true
      - name: regenerate subgraph schemas
        run: pnpm exec nx run-many -t generate-graphql --projects api-analytics,api-journeys,api-languages,api-media,api-users
        env:
          # Schema generation writes SDL and exits before serving anything,
          # but some modules validate env or construct clients at import time
          # (api-journeys env.ts, api-media crowdinClient). Values are never
          # used during generation, so placeholders are safe here.
          SKIP_ENV_VALIDATION: '1'
          CROWDIN_API_KEY: ci-schema-regen-placeholder
          CROWDIN_PROJECT_ID: '1'
      - name: recompose gateway supergraph
        # Runs after the subgraphs so the compose reads freshly generated
        # schema files, not the committed ones.
        run: pnpm exec nx run api-gateway:generate-graphql
      - name: fail if regenerated schemas differ from committed
        run: |
          if git diff --exit-code -- 'apis/*/schema.graphql'; then
            echo "✅ - committed schema.graphql files match generated output"
          else
            echo ""
            echo "🛑 - committed schema.graphql files are out of date with the code that generates them (see diff above)."
            echo "To fix: run 'nx generate-graphql <api>' for each API you changed, then 'nx generate-graphql api-gateway', and commit the updated schema.graphql files."
            exit 1
          fi
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    strategy:
      fail-fast: false
      matrix:
        # https://jestjs.io/docs/cli#--shard
        shard: ['1/3', '2/3', '3/3']
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch other branches
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --prune --depth=5 origin $GITHUB_BASE_REF
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: generate prisma imports
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: prisma-generate
          all: true
        env:
          DISABLE_ERD: true
      - name: Get number of CPU cores
        id: cpu-cores
        uses: SimenB/github-actions-cpu-cores@v2
      - name: run tests
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: test
          args: --ci --max-workers ${{ steps.cpu-cores.outputs.count }} --shard=${{ matrix.shard }}
          parallel: 1
      - name: download codecov
        run: |
          curl -o /usr/local/bin/codecov https://uploader.codecov.io/latest/linux/codecov
          chmod +x /usr/local/bin/codecov
      - name: upload coverage to codecov
        uses: mansagroup/nrwl-nx-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          targets: codecov
