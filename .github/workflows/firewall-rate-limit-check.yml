name: Firewall Rate-Limit Check (NES-1581)

# Manual detection check that verifies the Vercel Firewall rule on `/api/chat*`
# actually fires under load — without putting the owner's home IP at risk.
# Runs from GitHub-Actions-owned IPs only. This is NOT a load test.
#
# Pairs with the rollout plan in NES-1581:
#   Log → Challenge → Deny. Workflow expectations per stage:
#     - Log mode:       probe completes; all responses are 2xx; firewall logs
#                       show rule hits server-side.
#     - Challenge/Deny: probe is expected to start seeing 429s past the
#                       configured threshold. The probe job DOES NOT fail on
#                       429 — 429 is the success signal once past Log mode.
#
# The companion `sentinel` job answers "does legit traffic survive while the
# probe is hammering /api/chat?" by hitting a normal page in parallel.
#
# All real logic lives in tools/scripts/firewall-rate-limit-check/*.ts.
# This workflow is intentionally orchestration-only.

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment. WARNING: choosing `production` runs the probe against your.nextstep.is — only do this after the rule has settled in stage and the owner IP is allowlisted.'
        type: choice
        required: true
        default: stage
        options:
          - stage
          - production
      probe_count:
        description: 'Total number of POSTs the probe sends to /api/chat.'
        type: string
        required: true
        default: '100'
      probe_rps:
        description: 'Approximate probe requests per second. Keep gentle — this is a detection check, not a load test.'
        type: string
        required: true
        default: '2'
      sentinel_path:
        description: 'Path the sentinel GETs to verify legit traffic still works. Defaults to `/` because journey URLs are slug-dependent and the root is the most stable target seeded across both stage and production.'
        type: string
        required: true
        default: '/'

permissions:
  contents: read

# TODO(NES-1581 owner): once a GitHub `production` environment with required
# reviewers is configured for this repo, gate the production path by adding
# `environment: ${{ inputs.target_env == 'production' && 'production' || '' }}`
# to the probe + sentinel jobs. No environment config is present in this repo
# today (.github has no environments file), so we rely on the input default
# (`stage`) plus the explicit choice prompt to keep production opt-in.

concurrency:
  group: firewall-rate-limit-check-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve host
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      host: ${{ steps.host.outputs.host }}
      duration_seconds: ${{ steps.host.outputs.duration_seconds }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - id: host
        name: Resolve target host + probe duration
        env:
          TARGET_ENV: ${{ inputs.target_env }}
          PROBE_COUNT: ${{ inputs.probe_count }}
          PROBE_RPS: ${{ inputs.probe_rps }}
          SENTINEL_PATH: ${{ inputs.sentinel_path }}
        run: pnpm -s exec tsx tools/scripts/firewall-rate-limit-check/prepare.ts

  probe:
    name: Probe /api/chat
    needs: prepare
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Send probe requests
        env:
          HOST: ${{ needs.prepare.outputs.host }}
          PROBE_COUNT: ${{ inputs.probe_count }}
          PROBE_RPS: ${{ inputs.probe_rps }}
          RUN_ID: ${{ github.run_id }}
        run: pnpm -s exec tsx tools/scripts/firewall-rate-limit-check/probe.ts

  sentinel:
    name: Sentinel — legit traffic survives
    needs: prepare
    runs-on: blacksmith-2vcpu-ubuntu-2204
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: GET sentinel path at ~1 req/sec
        env:
          HOST: ${{ needs.prepare.outputs.host }}
          DURATION_SECONDS: ${{ needs.prepare.outputs.duration_seconds }}
          SENTINEL_PATH: ${{ inputs.sentinel_path }}
        run: pnpm -s exec tsx tools/scripts/firewall-rate-limit-check/sentinel.ts
