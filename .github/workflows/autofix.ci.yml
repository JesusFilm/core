name: autofix.ci
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main, feature/*]
  merge_group:
    branches: [main]
jobs:
  lint-work:
    # Skip /sync-ce PRs so autofix doesn't reformat CE-managed files.
    # Two load-bearing contracts from .claude/skills/sync-ce/SKILL.md:
    #   1. PR branch name contains `-chore-ce-sync-` — used on `pull_request` events
    #      where `github.head_ref` carries the original branch.
    #   2. PR commit message contains `sync compound-engineering` — used on
    #      `merge_group` events where `github.head_ref` is empty and
    #      `merge_group.head_ref` resolves to the readonly queue ref, not the
    #      original branch. The squashed merge commit on the queue keeps the
    #      PR title prefix, so we match against the head commit's message.
    if: >-
      ${{ !contains(github.head_ref, '-chore-ce-sync-') &&
          !contains(github.event.merge_group.head_commit.message, 'sync compound-engineering') }}
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      matrix:
        node-version: [22]
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch other branches
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --prune --depth=5 origin $GITHUB_BASE_REF
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: generate prisma imports
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: prisma-generate
          all: true
        env:
          DISABLE_ERD: true
      - name: Install apollo and graphql for codegen
        run: npm i -g apollo graphql # npm because apollo is deprecated and conflicts with graphql
      - name: Codegen
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: codegen
          all: true
      - name: Run Prettier
        run: pnpm run prettier:fix --check '!./.cache'
      - name: Type Check
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: type-check
      - name: Cache lint artifacts # after prettier and type-check
        uses: actions/cache@v4
        with:
          path: ./.cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-lint-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-lint-
      - name: Run ESLint
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: lint
          args: --fix
      - name: Extract Translations
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: extract-translations
      - name: Subgraph Check
        uses: mansagroup/nrwl-nx-action@v3
        with:
          targets: subgraph-check
        env:
          HIVE_TOKEN: ${{ secrets.HIVE_PROD_READ_ONLY_TOKEN }}
      - name: lint branch name
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm exec validate-branch-name -t $GITHUB_HEAD_REF
      - uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27
        with:
          commit-message: 'fix: lint issues'

  # Required-check wrapper. Resolves `lint (22)` to SUCCESS when lint-work
  # succeeded OR was skipped (e.g. /sync-ce PRs), and FAILURE otherwise.
  # Matrix `node-version: [22]` mirrors the original `lint` job so the
  # check name reported to the ruleset stays `lint (22)`.
  lint:
    needs: lint-work
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Resolve lint-work result
        run: |
          result='${{ needs.lint-work.result }}'
          echo "lint-work concluded: $result"
          # Pass on success or skipped (sync-ce PRs); fail closed on everything else.
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          else
            exit 1
          fi
