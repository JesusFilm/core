name: AI Build (Spike)
on:
  workflow_dispatch:
    inputs:
      spec:
        description: "Feature spec to implement"
        required: true
        type: string
      ticket:
        description: "Linear ticket ID (e.g. NES-777)"
        required: true
        type: string
      model:
        description: "Claude model to use"
        required: true
        type: choice
        default: sonnet
        options:
          - opus
          - sonnet
          - haiku

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate Linear ticket
        id: ticket
        run: |
          RESPONSE=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d "{\"query\": \"{ issue(id: \\\"$TICKET\\\") { id title gitBranchName } }\"}")

          TITLE=$(echo "$RESPONSE" | jq -r '.data.issue.title // empty')
          GIT_BRANCH=$(echo "$RESPONSE" | jq -r '.data.issue.gitBranchName // empty')

          if [ -z "$TITLE" ]; then
            echo "::error::Linear ticket $TICKET not found or inaccessible."
            exit 1
          fi

          # Replace the username prefix with ai-build
          BRANCH_NAME=$(echo "$GIT_BRANCH" | sed 's|^[^/]*/|ai-build/|')

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "Ticket: $TITLE"
          echo "Branch: $BRANCH_NAME"
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY_AI_BUILD_SYSTEM }}
          TICKET: ${{ github.event.inputs.ticket }}

      - name: Validate spec
        id: validate-spec
        run: |
          RESULT=$(cd /tmp && npx -y @anthropic-ai/claude-code -p "$PROMPT" --model "$MODEL" --dangerously-skip-permissions)
          echo "$RESULT"
          if echo "$RESULT" | grep -qx "SPEC_VALID"; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::error::Spec validation failed. See output above."
            exit 1
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_AI_BUILD_SYSTEM }}
          MODEL: ${{ github.event.inputs.model }}
          PROMPT: |
            You are a spec validator for the Next Steps (journeys-admin) application.
            Validate the following spec against these rules:

            1. DOMAIN: The spec must describe changes to journeys-admin (also known as next-steps-admin)
               and its related APIs (api-journeys, api-journeys-modern) or libraries (journeys-ui, shared-ui).
               Reject specs targeting other domains such as: watch, player, arclight, docs, cms, videos-admin,
               resources, short-links, CI/CD, infrastructure, or unrelated libraries.

            2. FORMAT: The spec must follow a user story structure:
               "As a [role], I want to [action] so that [benefit]"
               It should be clear, specific, and describe a single coherent change.
               Reject vague, multi-domain, or poorly structured specs.

            If BOTH rules pass, respond with exactly: SPEC_VALID
            If EITHER rule fails, respond with: SPEC_INVALID followed by a brief explanation of what is wrong
            and an example of a well-formed spec for reference.

            Spec to validate:
            ${{ github.event.inputs.spec }}

      - name: Fetch main ref for nx affected
        run: git fetch origin main:main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: npx nx run-many --target=prisma-generate

      - name: Create branch
        run: git checkout -b ${{ steps.ticket.outputs.branch }}

      - name: Run Claude
        run: cd /tmp && npx -y @anthropic-ai/claude-code -p "$SPEC" --model "$MODEL" --dangerously-skip-permissions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_AI_BUILD_SYSTEM }}
          MODEL: ${{ github.event.inputs.model }}
          SPEC: |
            Implement the following spec. After making changes:
            1. Run `npx nx affected --target=lint --base=main` to verify
            2. Run `npx nx affected --target=type-check --base=main` to verify
            If checks fail, attempt to fix. If you cannot fix after 2 attempts, stop and describe what failed.

            Spec:
            ${{ github.event.inputs.spec }}

      - name: Push and create PR
        run: |
          BRANCH="${{ steps.ticket.outputs.branch }}"
          TITLE="${{ steps.ticket.outputs.title }}"
          TICKET="${{ github.event.inputs.ticket }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ai-build($TICKET): $TITLE"
          git push --force-with-lease origin "$BRANCH"
          if ! gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "ai-build($TICKET): $TITLE" \
              --body "Automated build from spec via GitHub Actions spike.

Ticket: $TICKET
Spec: ${{ github.event.inputs.spec }}" \
              --base main
          else
            echo "PR already exists for this branch"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
