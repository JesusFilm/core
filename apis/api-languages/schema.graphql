extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.6", import: ["@extends", "@external", "@key"])

type AudioPreview
  @key(fields: "languageId")
{
  languageId: ID!
  language: Language!
  value: String!
  duration: Int!
  size: Int!
  bitrate: Int!
  codec: String!
}

type AuthenticatedUser implements User
  @key(fields: "id")
  @extends
{
  id: ID! @external
  languageUserRoles: [LanguageRole!]!
}

type Continent {
  id: ID!
  name(languageId: ID, primary: Boolean): [ContinentName!]!
  countries: [Country!]!
}

type ContinentName {
  value: String!
  primary: Boolean!
  language: Language!
}

input CountriesFilter {
  updatedAt: DateTimeFilter
}

type Country
  @key(fields: "id")
{
  id: ID!
  updatedAt: DateTime!
  population: Int
  latitude: Float
  longitude: Float
  flagPngSrc: String
  flagWebpSrc: String
  languages: [Language!]!
  name(languageId: ID, primary: Boolean): [CountryName!]!
  continent: Continent!
  countryLanguages: [CountryLanguage!]!
  languageCount: Int!
  languageHavingMediaCount: Int!
}

type CountryLanguage {
  id: ID!
  language: Language!
  country: Country!
  speakers: Int!
  displaySpeakers: Int
  primary: Boolean!
  suggested: Boolean!
  order: Int
}

type CountryName {
  value: String!
  primary: Boolean!
  language: Language!
}

"""
A date-time string at UTC, such as 2007-12-03T10:15:30Z, compliant with the `date-time` format outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for representation of dates and times using the Gregorian calendar.
"""
scalar DateTime

input DateTimeFilter {
  gte: DateTime
  lte: DateTime
}

type Language
  @key(fields: "id")
{
  id: ID!
  updatedAt: DateTime!
  bcp47: String
  iso3: String
  slug: String
  name(languageId: ID, primary: Boolean): [LanguageName!]!
  countryLanguages: [CountryLanguage!]!
  audioPreview: AudioPreview
}

enum LanguageIdType {
  databaseId
  bcp47
}

type LanguageName {
  value: String!
  primary: Boolean!
  language: Language!
}

enum LanguageRole {
  publisher
}

input LanguagesFilter {
  ids: [ID!]
  bcp47: [String!]
  iso3: [String!]
  updatedAt: DateTimeFilter
}

type Mutation {
  audioPreviewCreate(input: MutationAudioPreviewCreateInput!): AudioPreview!
  audioPreviewUpdate(input: MutationAudioPreviewUpdateInput!): AudioPreview!
  audioPreviewDelete(languageId: ID!): AudioPreview!
}

input MutationAudioPreviewCreateInput {
  languageId: ID!
  value: String!
  duration: Int!
  size: Int!
  bitrate: Int!
  codec: String!
}

input MutationAudioPreviewUpdateInput {
  languageId: ID!
  value: String
  duration: Int
  size: Int
  bitrate: Int
  codec: String
}

type Query {
  language(id: ID!, idType: LanguageIdType = databaseId): Language
  languages(offset: Int, limit: Int, where: LanguagesFilter, term: String): [Language!]!
  languagesCount(where: LanguagesFilter, term: String): Int!
  country(id: ID!): Country
  countries(term: String, ids: [ID!], where: CountriesFilter): [Country!]!
}

interface User {
  id: ID!
}