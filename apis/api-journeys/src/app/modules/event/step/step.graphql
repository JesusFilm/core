type StepViewEvent implements Event @shareable {
  id: ID!
  """
  ID of the journey that the stepBlock belongs to
  """
  journeyId: ID!
  """
  time event was created
  """
  createdAt: DateTime!
  """
  null for stepViewEvent
  """
  label: String
  """
  stepName of the stepBlock
  """
  value: String
}

type StepNextEvent implements Event @shareable {
  id: ID!
  """
  ID of the journey that the stepBlock belongs to
  """
  journeyId: ID!
  """
  time event was created
  """
  createdAt: DateTime!
  """
  stepName of the stepBlock
  """
  label: String
  """
  stepName of the next stepBlock
  """
  value: String
}

type StepPreviousEvent implements Event @shareable {
  id: ID!
  """
  ID of the journey that the stepBlock belongs to
  """
  journeyId: ID!
  """
  time event was created
  """
  createdAt: DateTime!
  """
  stepName of the current stepBlock
  """
  label: String
  """
  stepName of the previous stepBlock
  """
  value: String
}
