interface Block {
  id: ID!
  journeyId: ID!
  parentBlockId: ID
  parentOrder: Int
}

enum BlockEventLabel {
  custom1
  custom2
  custom3
  decisionForChrist
  gospelPresentationStart
  gospelPresentationComplete
  inviteFriend
  prayerRequest
  rsvp
  share
  specialVideoStart
  specialVideoComplete
}

extend type Journey {
  blocks: [Block!] @shareable
}

input BlockDuplicateIdMap {
  oldId: ID!
  newId: ID!
}

extend type Mutation {
  """
  blockRestore is used for redo/undo
  """
  blockRestore(id: ID!): [Block!]!
}
