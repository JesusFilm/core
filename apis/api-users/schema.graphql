extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.6", import: ["@key", "@shareable"])

type AnonymousUser implements User
  @key(fields: "id")
  @shareable
{
  id: ID!
}

enum App {
  NextSteps
  JesusFilmOne
}

type AuthenticatedUser implements User
  @key(fields: "id")
{
  id: ID!
  firstName: String!
  lastName: String
  email: String!
  imageUrl: String
  superAdmin: Boolean
  emailVerified: Boolean!
}

input CreateVerificationRequestInput {
  redirect: String
  app: App
}

input MeInput {
  redirect: String
  app: App
}

type Mutation {
  userImpersonate(email: String!): String
  createVerificationRequest(input: CreateVerificationRequestInput): Boolean
  validateEmail(email: String!, token: String!): AuthenticatedUser
  userDeleteCheck(idType: UserDeleteIdType!, id: String!): UserDeleteCheckResult!
}

type Query {
  me(input: MeInput): User
  user(id: ID!): AuthenticatedUser
  userByEmail(email: String!): AuthenticatedUser
}

type Subscription {
  userDeleteConfirm(idType: UserDeleteIdType!, id: String!): UserDeleteConfirmProgress!
}

interface User
  @key(fields: "id")
{
  id: ID!
}

type UserDeleteCheckResult {
  userId: String!
  userEmail: String
  userFirstName: String!
  journeysToDelete: Int!
  journeysToTransfer: Int!
  journeysToRemove: Int!
  teamsToDelete: Int!
  teamsToTransfer: Int!
  teamsToRemove: Int!
  logs: [UserDeleteLogEntry!]!
}

type UserDeleteConfirmProgress {
  log: UserDeleteLogEntry!
  done: Boolean!
  success: Boolean
}

enum UserDeleteIdType {
  databaseId
  email
}

type UserDeleteLogEntry {
  message: String!
  level: String!
  timestamp: String!
}